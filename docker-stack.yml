version: "3.8"

# =============================================================================
# WizzDesk — Docker Swarm Stack
# =============================================================================
# 1. Ajusta todos os CHANGE_ME_* abaixo
# 2. Constrói as imagens: bash build-images.sh
# 3. Deploy: docker stack deploy -c docker-stack.yml wizzdesk
# 4. Seed (primeira vez): bash seed.sh
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: evo_community
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: CHANGE_ME_DB_PASS
    volumes:
      - wizzdesk_postgres:/var/lib/postgresql/data
    networks:
      - wizzdesk_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  redis:
    image: redis:alpine
    command: ["sh", "-c", "redis-server --requirepass CHANGE_ME_REDIS_PASS --appendonly yes"]
    volumes:
      - wizzdesk_redis:/data
    networks:
      - wizzdesk_internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "CHANGE_ME_REDIS_PASS", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  # ---------------------------------------------------------------------------
  # Auth Service — Port 3001 → auth.desk.wizzcomms.com
  # ---------------------------------------------------------------------------
  evo-auth:
    image: wizzdesk/evo-auth:latest
    command: bash -c "bundle exec rails db:prepare && bundle exec rails s -p 3001 -b 0.0.0.0"
    environment:
      RAILS_ENV: production
      RAILS_MAX_THREADS: "5"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: CHANGE_ME_DB_PASS
      POSTGRES_DATABASE: evo_community
      REDIS_URL: redis://:CHANGE_ME_REDIS_PASS@redis:6379/1
      SECRET_KEY_BASE: CHANGE_ME_SECRET_64CHARS
      JWT_SECRET_KEY: CHANGE_ME_SECRET_64CHARS
      MFA_ISSUER: WizzDesk
      FRONTEND_URL: https://desk.wizzcomms.com
      DOORKEEPER_JWT_SECRET_KEY: CHANGE_ME_SECRET_64CHARS
      DOORKEEPER_JWT_ALGORITHM: hs256
      DOORKEEPER_JWT_ISS: evo-auth-service
      DOORKEEPER_JWT_AUD: "[]"
      EVOAI_CRM_API_TOKEN: CHANGE_ME_SERVICE_TOKEN
      MAILER_SENDER_EMAIL: support@wizzcomms.com
      SMTP_ADDRESS: smtp.resend.com
      SMTP_PORT: "587"
      SMTP_DOMAIN: wizzcomms.com
      SMTP_AUTHENTICATION: plain
      SMTP_ENABLE_STARTTLS_AUTO: "true"
      SMTP_USERNAME: resend
      SMTP_PASSWORD: CHANGE_ME_RESEND_KEY
      ACTIVE_STORAGE_SERVICE: local
      SIDEKIQ_CONCURRENCY: "5"
      RAILS_LOG_TO_STDOUT: "true"
      ENABLE_ACCOUNT_SIGNUP: "false"
    networks:
      - wizzdesk_internal
      - traefik_public
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
        delay: 20s
        max_attempts: 15
        window: 120s
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik_public
        - traefik.http.services.wizzdesk-auth.loadbalancer.server.port=3001
        - traefik.http.routers.wizzdesk-auth.rule=Host(`auth.desk.wizzcomms.com`)
        - traefik.http.routers.wizzdesk-auth.entrypoints=websecure
        - traefik.http.routers.wizzdesk-auth.tls=true

  evo-auth-sidekiq:
    image: wizzdesk/evo-auth:latest
    command: bash -c "bundle exec sidekiq"
    environment:
      RAILS_ENV: production
      POSTGRES_HOST: postgres
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: CHANGE_ME_DB_PASS
      POSTGRES_DATABASE: evo_community
      REDIS_URL: redis://:CHANGE_ME_REDIS_PASS@redis:6379/1
      SECRET_KEY_BASE: CHANGE_ME_SECRET_64CHARS
      EVOAI_CRM_API_TOKEN: CHANGE_ME_SERVICE_TOKEN
      RAILS_LOG_TO_STDOUT: "true"
    networks:
      - wizzdesk_internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
        delay: 30s
        max_attempts: 10
        window: 120s

  # ---------------------------------------------------------------------------
  # CRM Service — Port 3000 → crm.desk.wizzcomms.com
  # ---------------------------------------------------------------------------
  evo-crm:
    image: wizzdesk/evo-crm:latest
    entrypoint: docker/entrypoints/rails.sh
    command: ["bundle", "exec", "rails", "s", "-p", "3000", "-b", "0.0.0.0"]
    environment:
      RAILS_ENV: production
      POSTGRES_HOST: postgres
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: CHANGE_ME_DB_PASS
      POSTGRES_DATABASE: evo_community
      REDIS_URL: redis://:CHANGE_ME_REDIS_PASS@redis:6379/0
      SECRET_KEY_BASE: CHANGE_ME_SECRET_64CHARS
      JWT_SECRET_KEY: CHANGE_ME_SECRET_64CHARS
      BACKEND_URL: https://crm.desk.wizzcomms.com
      FRONTEND_URL: https://desk.wizzcomms.com
      EVO_AUTH_SERVICE_URL: http://evo-auth:3001
      EVO_AI_CORE_SERVICE_URL: http://evo-core:5555
      BOT_RUNTIME_URL: http://evo-bot-runtime:8080
      BOT_RUNTIME_SECRET: CHANGE_ME_BOT_SECRET
      BOT_RUNTIME_POSTBACK_BASE_URL: http://evo-crm:3000
      EVOAI_CRM_API_TOKEN: CHANGE_ME_SERVICE_TOKEN
      CORS_ORIGINS: https://desk.wizzcomms.com,https://*.desk.wizzcomms.com
      DISABLE_TELEMETRY: "true"
      RAILS_LOG_TO_STDOUT: "true"
      LOG_LEVEL: info
      ENABLE_ACCOUNT_SIGNUP: "false"
      ENABLE_PUSH_RELAY_SERVER: "true"
      ENABLE_INBOX_EVENTS: "true"
      MAILER_SENDER_EMAIL: support@wizzcomms.com
      SMTP_ADDRESS: smtp.resend.com
      SMTP_PORT: "587"
      SMTP_DOMAIN: wizzcomms.com
      SMTP_AUTHENTICATION: plain
      SMTP_ENABLE_STARTTLS_AUTO: "true"
      SMTP_USERNAME: resend
      SMTP_PASSWORD: CHANGE_ME_RESEND_KEY
      ACTIVE_STORAGE_SERVICE: local
      FB_VERIFY_TOKEN: evolution
      FACEBOOK_API_VERSION: v23.0
    volumes:
      - wizzdesk_crm_storage:/app/storage
    networks:
      - wizzdesk_internal
      - traefik_public
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
        delay: 30s
        max_attempts: 15
        window: 180s
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik_public
        - traefik.http.services.wizzdesk-crm.loadbalancer.server.port=3000
        - traefik.http.routers.wizzdesk-crm.rule=Host(`crm.desk.wizzcomms.com`)
        - traefik.http.routers.wizzdesk-crm.entrypoints=websecure
        - traefik.http.routers.wizzdesk-crm.tls=true

  evo-crm-sidekiq:
    image: wizzdesk/evo-crm:latest
    entrypoint: docker/entrypoints/rails.sh
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    environment:
      RAILS_ENV: production
      POSTGRES_HOST: postgres
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: CHANGE_ME_DB_PASS
      POSTGRES_DATABASE: evo_community
      REDIS_URL: redis://:CHANGE_ME_REDIS_PASS@redis:6379/0
      SECRET_KEY_BASE: CHANGE_ME_SECRET_64CHARS
      EVO_AUTH_SERVICE_URL: http://evo-auth:3001
      EVO_AI_CORE_SERVICE_URL: http://evo-core:5555
      BOT_RUNTIME_URL: http://evo-bot-runtime:8080
      BOT_RUNTIME_SECRET: CHANGE_ME_BOT_SECRET
      BOT_RUNTIME_POSTBACK_BASE_URL: http://evo-crm:3000
      EVOAI_CRM_API_TOKEN: CHANGE_ME_SERVICE_TOKEN
      RAILS_LOG_TO_STDOUT: "true"
    networks:
      - wizzdesk_internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
        delay: 30s
        max_attempts: 10
        window: 120s

  # ---------------------------------------------------------------------------
  # Core Service — Port 5555 → core.desk.wizzcomms.com
  # ---------------------------------------------------------------------------
  evo-core:
    image: wizzdesk/evo-core:latest
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: CHANGE_ME_DB_PASS
      DB_NAME: evo_community
      DB_SSLMODE: disable
      PORT: "5555"
      JWT_SECRET_KEY: CHANGE_ME_SECRET_64CHARS
      JWT_ALGORITHM: HS256
      EVOLUTION_BASE_URL: http://evo-crm:3000
      EVO_AUTH_BASE_URL: http://evo-auth:3001
      AI_PROCESSOR_URL: http://evo-processor:8000
      AI_PROCESSOR_VERSION: v1
      ENCRYPTION_KEY: CHANGE_ME_FERNET_KEY
    networks:
      - wizzdesk_internal
      - traefik_public
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
        delay: 15s
        max_attempts: 10
        window: 60s
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik_public
        - traefik.http.services.wizzdesk-core.loadbalancer.server.port=5555
        - traefik.http.routers.wizzdesk-core.rule=Host(`core.desk.wizzcomms.com`)
        - traefik.http.routers.wizzdesk-core.entrypoints=websecure
        - traefik.http.routers.wizzdesk-core.tls=true

  # ---------------------------------------------------------------------------
  # Processor Service — Port 8000 (interno)
  # ---------------------------------------------------------------------------
  evo-processor:
    image: wizzdesk/evo-processor:latest
    environment:
      POSTGRES_CONNECTION_STRING: postgresql://postgres:CHANGE_ME_DB_PASS@postgres:5432/evo_community
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: CHANGE_ME_REDIS_PASS
      REDIS_SSL: "false"
      HOST: "0.0.0.0"
      PORT: "8000"
      DEBUG: "false"
      ORGANIZATION_NAME: WizzDesk
      ORGANIZATION_URL: https://desk.wizzcomms.com
      EVO_AI_CRM_URL: http://evo-crm:3000
      CORE_SERVICE_URL: http://evo-core:5555/api/v1
      ENCRYPTION_KEY: CHANGE_ME_FERNET_KEY
      EVOAI_CRM_API_TOKEN: CHANGE_ME_SERVICE_TOKEN
      API_TITLE: Agent Processor Community
      API_DESCRIPTION: Agent Processor Community for WizzDesk
      APP_URL: https://desk.wizzcomms.com
    volumes:
      - wizzdesk_processor_logs:/app/logs
    networks:
      - wizzdesk_internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
        delay: 15s
        max_attempts: 10
        window: 60s

  # ---------------------------------------------------------------------------
  # Bot Runtime — Port 8080 (interno)
  # ---------------------------------------------------------------------------
  evo-bot-runtime:
    image: wizzdesk/evo-bot-runtime:latest
    environment:
      LISTEN_ADDR: "0.0.0.0:8080"
      REDIS_URL: redis://:CHANGE_ME_REDIS_PASS@redis:6379
      AI_PROCESSOR_URL: http://evo-processor:8000
      BOT_RUNTIME_SECRET: CHANGE_ME_BOT_SECRET
    networks:
      - wizzdesk_internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
        delay: 15s
        max_attempts: 10
        window: 60s

  # ---------------------------------------------------------------------------
  # Frontend — Port 80 → desk.wizzcomms.com + *.desk.wizzcomms.com
  # ---------------------------------------------------------------------------
  evo-frontend:
    image: wizzdesk/evo-frontend:latest
    networks:
      - wizzdesk_internal
      - traefik_public
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 10
        window: 60s
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik_public
        - traefik.http.services.wizzdesk-frontend.loadbalancer.server.port=80
        - traefik.http.routers.wizzdesk.rule=Host(`desk.wizzcomms.com`) || HostRegexp(`{subdomain:[a-z0-9-]+}.desk.wizzcomms.com`)
        - traefik.http.routers.wizzdesk.entrypoints=websecure
        - traefik.http.routers.wizzdesk.tls=true
        - traefik.http.routers.wizzdesk.priority=1

volumes:
  wizzdesk_postgres:
  wizzdesk_redis:
  wizzdesk_crm_storage:
  wizzdesk_processor_logs:

networks:
  traefik_public:
    external: true
  wizzdesk_internal:
    driver: overlay
    attachable: true